<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Yearbook - Angkatan 20</title>
    <link rel="stylesheet" href="/src/components/style.css">
</head>

<body class="bg-gray-900 overflow-hidden font-sans">

    <!-- Loading Overlay -->
    <div id="loading-screen"
        class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative mb-8">
            <div
                class="w-16 h-16 md:w-20 md:h-20 border-4 border-blue-400 border-t-transparent rounded-full animate-spin">
            </div>
            <div class="absolute inset-0 w-16 h-16 md:w-20 md:h-20 border-4 border-white/20 rounded-full"></div>
        </div>
        <p class="text-white text-base md:text-lg tracking-[0.3em] uppercase font-semibold animate-pulse">Opening
            Archive...</p>
        <p class="text-gray-500 text-xs md:text-sm mt-3 font-light">Memuat halaman yearbook</p>
    </div>

    <!-- Navigation (Premium Style) -->
    <nav class="fixed top-0 left-0 right-0 z-40 p-4 md:p-6 flex justify-between items-center pointer-events-none">
        <a href="/" data-navigo
            class="pointer-events-auto flex items-center gap-2 md:gap-3 bg-white/10 backdrop-blur-md px-4 md:px-5 py-2.5 md:py-3 rounded-full text-white hover:bg-white/20 transition-all border border-white/10 group">
            <svg class="w-4 h-4 md:w-5 md:h-5 transform group-hover:-translate-x-1 transition-transform" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-sm md:text-base font-semibold">Kembali</span>
        </a>
        <div class="pointer-events-auto">
            <button id="guide-btn"
                class="bg-white/10 backdrop-blur-md p-2.5 md:p-3 rounded-full text-white hover:bg-white/20 transition-all border border-white/10 hover:scale-105">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Guide Modal (Enhanced) -->
    <div id="guide-modal"
        class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center hidden opacity-0 transition-opacity duration-300 px-4">
        <div
            class="bg-gradient-to-br from-gray-800 to-gray-900 p-8 md:p-10 rounded-3xl max-w-md w-full text-center border border-white/20 shadow-2xl transform scale-95 transition-transform duration-300">
            <h3 class="text-2xl md:text-3xl font-bold text-white mb-6 tracking-tight">Cara Membaca Yearbook</h3>
            <div class="space-y-5 text-gray-300 mb-10">
                <div class="flex items-start gap-3 text-left bg-white/5 p-4 rounded-xl border border-white/10">
                    <div>
                        <p class="font-semibold text-blue-400 mb-1">Desktop</p>
                        <p class="text-sm">Klik & drag ujung halaman atau gunakan tombol panah di bawah.</p>
                    </div>
                </div>
                <div class="flex items-start gap-3 text-left bg-white/5 p-4 rounded-xl border border-white/10">
                    <div>
                        <p class="font-semibold text-blue-400 mb-1">Mobile</p>
                        <p class="text-sm">Swipe layar atau ketuk ujung halaman untuk membalik.</p>
                    </div>
                </div>
            </div>
            <button id="close-guide"
                class="w-full px-8 py-4 bg-gradient-to-r from-blue-400 to-blue-500 text-black font-bold rounded-full hover:from-blue-300 hover:to-blue-400 transition-all hover:shadow-[0_0_25px_rgba(250,204,21,0.4)] hover:scale-105 transform">Mengerti</button>
        </div>
    </div>

    <!-- 3D Scene Container -->
    <main class="w-full h-screen flex items-center justify-center bg-black relative overflow-hidden">

        <!-- Ambient Background -->
        <div
            class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-gray-900 via-black to-black">
        </div>

        <!-- Subtle Pattern Overlay -->
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-10">
        </div>

        <!-- The Book Container -->
        <div id="book-container" class="relative z-10 opacity-0 transform scale-90 transition-all duration-1000">
            <div id="yearbook" class="shadow-2xl">
                <!-- Pages will be injected here by JS -->
            </div>
        </div>

        <!-- Controls (Enhanced) -->
        <div class="fixed bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 z-40 flex gap-3 md:gap-4 pointer-events-auto opacity-0 transition-opacity duration-500"
            id="book-controls">
            <button id="prev-btn"
                class="p-3 md:p-4 bg-white/10 backdrop-blur-md rounded-full text-white hover:bg-white/20 transition-all border border-white/20 hover:scale-110 hover:border-white/30 active:scale-95 shadow-lg">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <div
                class="px-5 md:px-6 py-3 md:py-4 bg-gradient-to-r from-white/10 to-white/5 backdrop-blur-md rounded-full text-white border border-white/20 font-mono text-sm md:text-base flex items-center shadow-lg min-w-[100px] md:min-w-[120px] justify-center">
                <span id="page-num" class="font-semibold">Cover</span>
            </div>
            <button id="next-btn"
                class="p-3 md:p-4 bg-white/10 backdrop-blur-md rounded-full text-white hover:bg-white/20 transition-all border border-white/20 hover:scale-110 hover:border-white/30 active:scale-95 shadow-lg">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                </svg>
            </button>
        </div>

    </main>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/scripts/yearbook.js"></script>
</body>

</html>
