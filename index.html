<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angkatan 20 - SMKN 5 Kab. Tangerang</title>
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/assets/logo.webp">
  <link rel="apple-touch-icon" href="/assets/logo.webp">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/components/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- SPA Redirect Handler (GitHub Pages) -->
  <script>
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <script type="module" src="/src/main.js"></script>
</head>

<body class="font-sans antialiased bg-white text-black selection:bg-gray-200">

  <!-- Main App Container -->
  <div id="app">
    <!-- Content will be loaded here by the router -->
    <div id="landing-loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
      <div class="relative mb-6">
        <div class="w-12 h-12 md:w-16 md:h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <div class="absolute inset-0 w-12 h-12 md:w-16 md:h-16 border-4 border-white/10 rounded-full"></div>
      </div>
      <h2 class="text-white text-lg md:text-xl font-bold tracking-widest uppercase animate-pulse">Menyiapkan Memori</h2>
      <p class="text-gray-400 text-xs md:text-sm mt-2 font-light text-center px-6">Jika gambar belum muncul, sistem sedang mengambilnya dari arsip...</p>
    </div>
  </div>

  <!-- Year Selection Modal (For Taruna) -->
  <div id="year-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0" id="year-modal-backdrop">
    </div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div
        class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 transform scale-95 opacity-0 transition-all duration-300"
        id="year-modal-content">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-gray-900 tracking-tight">Pilih Tahun</h3>
          <button id="close-year-modal"
            class="text-gray-400 hover:text-gray-600 transition-colors p-2 bg-gray-100 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="space-y-3" id="year-options-container">
          <div class="animate-pulse flex flex-col gap-3">
            <div class="h-14 bg-gray-100 rounded-xl"></div>
            <div class="h-14 bg-gray-100 rounded-xl"></div>
            <div class="h-14 bg-gray-100 rounded-xl"></div>
          </div>
        </div>
        <p class="text-xs text-center text-gray-400 mt-6">Pilih tahun angkatan untuk melihat momen.</p>
      </div>
    </div>
  </div>

  <!-- Class Selection Modal (For Kelas) -->
  <div id="class-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity opacity-0" id="class-modal-backdrop">
    </div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div
        class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 md:p-8 transform scale-95 opacity-0 transition-all duration-300 max-h-[85vh] flex flex-col"
        id="class-modal-content">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl md:text-2xl font-bold text-gray-900 tracking-tight">Pilih Kelas</h3>
          <button id="close-class-modal"
            class="text-gray-400 hover:text-gray-600 transition-colors p-2 bg-gray-100 rounded-full">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-4">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <input type="text" id="class-search-input" placeholder="Cari kelas atau jurusan..."
            class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-gray-300 focus:border-transparent transition-all" />
        </div>

        <div class="overflow-y-auto flex-1 pr-1 -mr-1">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3" id="class-options-container">
            <div class="animate-pulse flex flex-col gap-3 col-span-full">
              <div class="h-14 bg-gray-100 rounded-xl"></div>
              <div class="h-14 bg-gray-100 rounded-xl"></div>
              <div class="h-14 bg-gray-100 rounded-xl"></div>
            </div>
          </div>
          <p id="class-no-results" class="text-center text-gray-400 text-sm py-8 hidden">Tidak ada kelas yang ditemukan.
          </p>
        </div>
        <p class="text-xs text-center text-gray-400 mt-4 pt-4 border-t border-gray-100">Pilih kelas untuk melihat momen.
        </p>
      </div>
    </div>
  </div>

  <!-- Photo Lightbox Modal -->
  <div id="photo-lightbox" class="fixed inset-0 z-[200] hidden bg-black/95 backdrop-blur-sm" role="dialog"
    aria-modal="true">
    <button id="close-lightbox"
      class="absolute top-4 right-4 z-10 text-white/80 hover:text-white transition-colors p-3 bg-white/10 rounded-full backdrop-blur-md">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <img id="lightbox-image" src="" alt="Full Photo"
        class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
    </div>
  </div>

</body>

</html>
